<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Tests — Expense &amp; Budget Visualizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f4f6f8;
      color: #222;
      padding: 2rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .suite { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .suite h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #333; }
    .result {
      padding: 0.45rem 0.75rem;
      border-radius: 5px;
      margin-bottom: 0.4rem;
      font-size: 0.875rem;
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
    }
    .result.pass { background: #e6f4ea; color: #1a7a35; }
    .result.fail { background: #fdecea; color: #b71c1c; }
    .result .icon { font-weight: bold; flex-shrink: 0; }
    .result .detail { word-break: break-all; }
    .summary {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .summary.all-pass { background: #d4edda; color: #155724; }
    .summary.has-fail { background: #f8d7da; color: #721c24; }
    .validates { font-size: 0.78rem; color: #888; margin-top: 0.4rem; font-style: italic; }
  </style>
</head>
<body>
  <h1>Property Tests — Expense &amp; Budget Visualizer</h1>
  <p class="subtitle">Open this file in a browser. Tests run automatically on load.</p>

  <div id="output"></div>

  <script>
    // ─────────────────────────────────────────────────────────────────────────
    // Minimal inline test harness
    // ─────────────────────────────────────────────────────────────────────────

    const suites = [];

    function describe(name, fn) {
      const suite = { name, tests: [] };
      suites.push(suite);
      fn(suite);
    }

    function it(suite, description, fn) {
      suite.tests.push({ description, fn });
    }

    function runAll() {
      const output = document.getElementById("output");
      let totalPass = 0;
      let totalFail = 0;

      suites.forEach(suite => {
        const suiteEl = document.createElement("div");
        suiteEl.className = "suite";
        suiteEl.innerHTML = `<h2>${suite.name}</h2>`;

        suite.tests.forEach(test => {
          let passed = false;
          let message = "";
          try {
            test.fn();
            passed = true;
          } catch (e) {
            message = e.message || String(e);
          }

          if (passed) totalPass++;
          else totalFail++;

          const div = document.createElement("div");
          div.className = `result ${passed ? "pass" : "fail"}`;
          div.innerHTML = `
            <span class="icon">${passed ? "✓" : "✗"}</span>
            <span class="detail">
              ${test.description}
              ${!passed ? `<br><small>${escHtml(message)}</small>` : ""}
            </span>
          `;
          suiteEl.appendChild(div);
        });

        output.appendChild(suiteEl);
      });

      const summary = document.createElement("div");
      const allPass = totalFail === 0;
      summary.className = `summary ${allPass ? "all-pass" : "has-fail"}`;
      summary.textContent = allPass
        ? `All ${totalPass} tests passed.`
        : `${totalPass} passed, ${totalFail} failed.`;
      output.appendChild(summary);
    }

    function assert(condition, message) {
      if (!condition) throw new Error(message || "Assertion failed");
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Storage contract — minimal implementation under test
    // (mirrors the logic in js/app.js without depending on its DOM or globals)
    // ─────────────────────────────────────────────────────────────────────────

    const STORAGE_KEY = "ebv_transactions";

    /**
     * Write an array of transactions to localStorage.
     * Mirrors saveToStorage() in app.js.
     */
    function saveToStorage(txArray) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(txArray));
    }

    /**
     * Read and parse the stored transaction array.
     * Mirrors loadFromStorage() in app.js; falls back to [] on error.
     */
    function loadFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Property-based test generators
    // ─────────────────────────────────────────────────────────────────────────

    const CATEGORIES = ["Food", "Transport", "Fun"];

    /** Pseudo-random number seeded with current time for reproducibility within a run */
    let seed = Date.now() % 2147483647;
    function rand() {
      seed = (seed * 16807 + 0) % 2147483647;
      return (seed - 1) / 2147483646;
    }
    function randInt(min, max) {
      return Math.floor(rand() * (max - min + 1)) + min;
    }
    function randString(len = 6) {
      const chars = "abcdefghijklmnopqrstuvwxyz";
      let s = "";
      for (let i = 0; i < len; i++) s += chars[randInt(0, chars.length - 1)];
      return s;
    }

    /** Generate a single random valid transaction */
    function genTransaction() {
      return {
        id:       "tx-" + Math.floor(rand() * 1e9).toString(36) + randString(4),
        name:     randString(randInt(3, 12)),
        amount:   Math.round(rand() * 1e6 * 100) / 100 + 0.01, // always > 0
        category: CATEGORIES[randInt(0, 2)],
      };
    }

    /** Generate a random non-empty array of transactions */
    function genTransactionArray(minLen = 1, maxLen = 20) {
      const len = randInt(minLen, maxLen);
      return Array.from({ length: len }, genTransaction);
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Helper: run a property against N random inputs
    // ─────────────────────────────────────────────────────────────────────────

    function property(label, numRuns, generator, predicate) {
      for (let i = 0; i < numRuns; i++) {
        const input = generator();
        const result = predicate(input);
        if (result !== true) {
          throw new Error(
            `Counter-example found after ${i + 1} run(s).\n` +
            `Input: ${JSON.stringify(input)}\n` +
            `Reason: ${result}`
          );
        }
      }
    }

    // ─────────────────────────────────────────────────────────────────────────
    // Property 5: Transaction persistence round-trip
    //
    // "For any transaction added, JSON.parse(localStorage.getItem('ebv_transactions'))
    //  should contain an entry matching that transaction's id, name, amount, and category."
    //
    // Validates: Requirements 5.1, 5.2
    // ─────────────────────────────────────────────────────────────────────────

    describe("Property 5 — Local Storage round-trip (Validates: Requirements 5.1, 5.2)", suite => {

      // ── P5-a: Single transaction is found after save ──────────────────────
      it(suite,
        "[P5-a] For any single transaction, saving it then reading localStorage yields a matching entry (50 runs)",
        () => {
          property(
            "single round-trip",
            50,
            () => genTransaction(),
            (tx) => {
              localStorage.removeItem(STORAGE_KEY);
              saveToStorage([tx]);

              const stored = loadFromStorage();
              const found = stored.find(s => s.id === tx.id);

              if (!found)
                return `Transaction id "${tx.id}" not found in stored array`;
              if (found.name !== tx.name)
                return `name mismatch: expected "${tx.name}", got "${found.name}"`;
              if (found.amount !== tx.amount)
                return `amount mismatch: expected ${tx.amount}, got ${found.amount}`;
              if (found.category !== tx.category)
                return `category mismatch: expected "${tx.category}", got "${found.category}"`;

              return true;
            }
          );
        }
      );

      // ── P5-b: Every transaction in a batch is found after save ────────────
      it(suite,
        "[P5-b] For any array of transactions, every entry survives the round-trip intact (50 runs)",
        () => {
          property(
            "batch round-trip",
            50,
            () => genTransactionArray(1, 15),
            (txArray) => {
              localStorage.removeItem(STORAGE_KEY);
              saveToStorage(txArray);

              const stored = loadFromStorage();

              for (const tx of txArray) {
                const found = stored.find(s => s.id === tx.id);
                if (!found)
                  return `Transaction id "${tx.id}" not found after batch save`;
                if (found.name !== tx.name)
                  return `name mismatch for id "${tx.id}": expected "${tx.name}", got "${found.name}"`;
                if (found.amount !== tx.amount)
                  return `amount mismatch for id "${tx.id}": expected ${tx.amount}, got ${found.amount}`;
                if (found.category !== tx.category)
                  return `category mismatch for id "${tx.id}": expected "${tx.category}", got "${found.category}"`;
              }

              return true;
            }
          );
        }
      );

      // ── P5-c: Stored count matches the saved array length ─────────────────
      it(suite,
        "[P5-c] The number of entries in localStorage equals the number of saved transactions (50 runs)",
        () => {
          property(
            "count preservation",
            50,
            () => genTransactionArray(0, 20),
            (txArray) => {
              localStorage.removeItem(STORAGE_KEY);
              saveToStorage(txArray);

              const stored = loadFromStorage();

              if (stored.length !== txArray.length)
                return `expected ${txArray.length} stored entries, got ${stored.length}`;

              return true;
            }
          );
        }
      );

      // ── P5-d: Empty array round-trips correctly ───────────────────────────
      it(suite,
        "[P5-d] Saving an empty transaction array persists as an empty array",
        () => {
          localStorage.removeItem(STORAGE_KEY);
          saveToStorage([]);

          const stored = loadFromStorage();
          assert(Array.isArray(stored),   "loadFromStorage should return an array");
          assert(stored.length === 0,     "stored length should be 0 for an empty save");
        }
      );

      // ── P5-e: Overwrite semantics — most recent save wins ─────────────────
      it(suite,
        "[P5-e] Saving a second batch overwrites the first; only the latest transactions survive (30 runs)",
        () => {
          property(
            "overwrite semantics",
            30,
            () => ({ first: genTransactionArray(1, 8), second: genTransactionArray(1, 8) }),
            ({ first, second }) => {
              localStorage.removeItem(STORAGE_KEY);
              saveToStorage(first);
              saveToStorage(second);          // overwrites

              const stored = loadFromStorage();

              // All second-batch ids must be present
              for (const tx of second) {
                if (!stored.find(s => s.id === tx.id))
                  return `id "${tx.id}" from second batch not found`;
              }

              // No first-batch id may survive (unless it also appears in second by coincidence)
              const secondIds = new Set(second.map(t => t.id));
              for (const tx of first) {
                if (!secondIds.has(tx.id) && stored.find(s => s.id === tx.id))
                  return `id "${tx.id}" from first batch should have been overwritten`;
              }

              return true;
            }
          );
        }
      );

      // ── P5-f: loadFromStorage returns [] when key is absent ───────────────
      it(suite,
        "[P5-f] loadFromStorage returns an empty array when the localStorage key is absent",
        () => {
          localStorage.removeItem(STORAGE_KEY);

          const result = loadFromStorage();
          assert(Array.isArray(result),  "should return an array");
          assert(result.length === 0,    "should be empty when key is absent");
        }
      );

      // ── P5-g: loadFromStorage returns [] for malformed JSON ───────────────
      it(suite,
        "[P5-g] loadFromStorage returns an empty array when localStorage contains malformed JSON",
        () => {
          localStorage.setItem(STORAGE_KEY, "{ this is not valid JSON [[[");

          const result = loadFromStorage();
          assert(Array.isArray(result),  "should return an array on parse error");
          assert(result.length === 0,    "should be empty on parse error");
        }
      );

      // ── P5-h: Transaction fields survive JSON serialization precisely ─────
      it(suite,
        "[P5-h] Numeric amounts are preserved with full precision through JSON round-trip (50 runs)",
        () => {
          property(
            "numeric precision",
            50,
            () => {
              const tx = genTransaction();
              // Use amounts with up to 2 decimal places — typical currency values
              tx.amount = Math.round(rand() * 999999 * 100) / 100 + 0.01;
              return tx;
            },
            (tx) => {
              saveToStorage([tx]);
              const stored = loadFromStorage();
              const found = stored[0];

              if (found.amount !== tx.amount)
                return `amount precision lost: saved ${tx.amount}, got back ${found.amount}`;

              return true;
            }
          );
        }
      );

    });

    // ─────────────────────────────────────────────────────────────────────────
    // Run everything
    // ─────────────────────────────────────────────────────────────────────────
    runAll();
  </script>

  <p class="validates" style="margin-top:1.5rem;">
    <strong>Validates:</strong> Requirements 5.1, 5.2 &nbsp;|&nbsp; Property 5: Transaction persistence round-trip
  </p>
</body>
</html>
