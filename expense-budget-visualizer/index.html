<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Expense &amp; Budget Visualizer</h1>

      <!-- Balance Banner -->
      <section id="balance-section" aria-label="Total Balance">
        <h2>Total Balance</h2>
        <p id="total-balance">Rp 0</p>
      </section>

      <!-- Input Form -->
      <section id="form-section" aria-label="Add Transaction">
        <h2>Add Transaction</h2>
        <form id="transaction-form" novalidate>
          <div class="form-group">
            <label for="item-name">Item Name</label>
            <input
              id="item-name"
              type="text"
              placeholder="e.g. Lunch"
              autocomplete="off"
              required
            />
          </div>

          <div class="form-group">
            <label for="item-amount">Amount (Rp)</label>
            <input
              id="item-amount"
              type="number"
              placeholder="e.g. 15000"
              min="0.01"
              step="any"
              required
            />
          </div>

          <div class="form-group">
            <label for="item-category">Category</label>
            <select id="item-category" required>
              <option value="">Select category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
          </div>

          <button type="submit">Add Transaction</button>
          <p id="form-error" aria-live="polite"></p>
        </form>
      </section>

      <!-- Transaction List -->
      <section id="list-section" aria-label="Transaction List">
        <h2>Transactions</h2>
        <ul id="transaction-list" aria-label="List of transactions"></ul>
        <p id="empty-state">No transactions yet.</p>
      </section>

      <!-- Chart -->
      <section id="chart-section" aria-label="Spending by Category">
        <h2>Spending by Category</h2>
        <canvas id="categoryChart" role="img" aria-label="Pie chart of spending by category"></canvas>
      </section>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script defer src="js/app.js"></script>
  </body>
</html>
